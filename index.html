<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheese Studios | Neon Parkour</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #game-ui { position: absolute; top: 20px; left: 20px; color: #0ff; z-index: 10; pointer-events: none; text-shadow: 0 0 10px #0ff; }
        .menu-btn { 
            position: absolute; bottom: 20px; right: 20px; 
            padding: 12px 25px; background: transparent; color: #ff00ff; 
            border: 2px solid #ff00ff; cursor: pointer; font-weight: bold; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; z-index: 20;
        }
        .menu-btn:hover { background: #ff00ff; color: white; box-shadow: 0 0 20px #ff00ff; }
        #credits-modal {
            display: none; position: fixed; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(5, 5, 5, 0.95);
            color: #0ff; padding: 50px; border: 1px solid #0ff;
            text-align: center; z-index: 100; box-shadow: 0 0 50px rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(10px); border-radius: 15px;
        }
    </style>
</head>
<body>

    <div id="game-ui">
        <h1 id="level-display" style="margin:0;">LEVEL 01</h1>
        <p style="letter-spacing: 3px; color: #ff00ff;">CHEESE STUDIOS PROTOCOL</p>
    </div>

    <button class="menu-btn" onclick="toggleCredits()">Credits</button>

    <div id="credits-modal" onclick="toggleCredits()">
        <h1 style="color: #ff00ff; letter-spacing: 5px;">SYSTEM INFO</h1>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <h2 style="color: #fff; margin: 5px;">OWNED BY AARUSH KUMAR GUBYAD</h2>
        <h3 style="color: #0ff; margin: 5px;">LEAD DESIGNER: ABHYUDAY SHUKLA</h3>
        <p style="margin-top: 20px;">A PRODUCT MADE BY <strong style="color: #ff00ff;">CHEESE STUDIOS</strong></p>
        <p style="font-size: 0.7em; opacity: 0.6;">AN AARUSH KUMAR GUBYAD GAME</p>
        <p style="font-size: 0.8em; color: #444; margin-top: 30px;">[ CLICK TO CLOSE ]</p>
    </div>

<script>
function toggleCredits() {
    const modal = document.getElementById('credits-modal');
    modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
}

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 1600 }, debug: false }
    },
    scene: { create: create, update: update }
};

let player, platforms, goal, cursors, emitter;
let currentLevel = 1;
let isDead = false;
const game = new Phaser.Game(config);

function create() {
    isDead = false;
    const worldWidth = 3500;
    this.physics.world.setBounds(0, 0, worldWidth, config.height + 100);
    
    // Grid Background
    let graphics = this.add.graphics();
    graphics.lineStyle(1, 0x00ffff, 0.05);
    for(let i=0; i<worldWidth; i+=60) graphics.lineBetween(i, 0, i, config.height);
    for(let i=0; i<config.height; i+=60) graphics.lineBetween(0, i, worldWidth, i);

    platforms = this.physics.add.staticGroup();

    // Generation Logic
    createPlatform(this, 150, config.height - 100, 300, 30);
    let lastX = 400;
    let lastY = config.height - 100;

    for (let i = 0; i < 10; i++) {
        let gap = 160 + (Math.random() * 70);
        let vertical = (Math.random() - 0.5) * 180;
        let newX = lastX + gap;
        let newY = Phaser.Math.Clamp(lastY + vertical, 200, config.height - 100);
        createPlatform(this, newX, newY, 120, 20);
        lastX = newX;
        lastY = newY;
    }

    // Goal
    goal = this.add.rectangle(lastX + 250, lastY - 50, 60, 120, 0xffffff);
    this.physics.add.existing(goal, true);

    // Player
    player = this.add.rectangle(150, config.height - 200, 30, 30, 0x00ffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);

    // Particles for Death
    const particles = this.add.graphics();
    particles.fillStyle(0xff00ff, 1);
    particles.fillRect(0,0,4,4);
    particles.generateTexture('dot', 4, 4);
    emitter = this.add.particles(0, 0, 'dot', {
        speed: { min: -200, max: 200 },
        angle: { min: 0, max: 360 },
        scale: { start: 1, end: 0 },
        lifespan: 600,
        emitting: false
    });

    this.cameras.main.startFollow(player, true, 0.1, 0.1);
    this.physics.add.collider(player, platforms);
    this.physics.add.overlap(player, goal, () => {
        currentLevel++;
        document.getElementById('level-display').innerText = `LEVEL ${currentLevel.toString().padStart(2, '0')}`;
        this.scene.restart();
    });

    cursors = this.input.keyboard.createCursorKeys();
}

function createPlatform(scene, x, y, w, h) {
    const p = scene.add.rectangle(x, y, w, h, 0xff00ff);
    scene.physics.add.existing(p, true);
    platforms.add(p);
    p.setStrokeStyle(2, 0x00ffff);
}

function update() {
    if (isDead) return;

    if (cursors.left.isDown) player.body.setVelocityX(-400);
    else if (cursors.right.isDown) player.body.setVelocityX(400);
    else player.body.setVelocityX(0);

    if (cursors.up.isDown && player.body.touching.down) {
        player.body.setVelocityY(-750);
    }

    // DEATH LOGIC
    if (player.y > config.height - 20) {
        die(this);
    }
}

function die(scene) {
    isDead = true;
    emitter.emitParticleAt(player.x, player.y, 20);
    player.alpha = 0;
    scene.cameras.main.shake(200, 0.02);
    scene.cameras.main.flash(200, 255, 0, 0);
    
    scene.time.delayedCall(600, () => {
        scene.scene.restart();
    });
}
</script>
</body>
</html>
